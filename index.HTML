<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cartoon Hit Quiz</title>
<style>
  :root {
    --bg: linear-gradient(135deg,#a8e6ff,#fbe7ff);
    --card: white;
    --accent: #ff6b6b;
    --muted: #555;
  }
  html,body {height:100%; margin:0; font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial;}
  body {background:var(--bg); display:flex; align-items:center; justify-content:center; padding:20px;}
  .container {width:1100px; max-width:100%; background:var(--card); border-radius:14px; box-shadow:0 10px 30px rgba(10,20,40,0.12); overflow:hidden; display:grid; grid-template-columns: 360px 1fr;}
  .left {background:linear-gradient(200deg,#fff,#f7fbff); padding:26px; display:flex; flex-direction:column; gap:18px; align-items:center; justify-content:flex-start;}
  .title {font-weight:800; font-size:30px; color:#123; text-align:center;}
  .mascot-wrap {width:260px; height:260px; display:flex; align-items:center; justify-content:center; position:relative;}
  /* tiny stage behind mascot */
  .stage {width:100%; height:40px; background:linear-gradient(90deg,#dff2d8,#cfe7ce); position:absolute; bottom:22px; left:0; border-radius:10px;}

  /* SVG mascot sizing */
  svg {width:220px; height:220px; overflow:visible;}

  /* arm swing animation (trigger via class) */
  .arm-swing { transform-origin: 180px 110px; animation: swing 550ms ease-in-out forwards; }
  @keyframes swing { 0% { transform: rotate(0deg); } 50% { transform: rotate(-100deg); } 100% { transform: rotate(0deg); } }

  /* wrong shake */
  .mascot-shake { animation: shake 520ms cubic-bezier(.36,.07,.19,.97); transform-origin:center; }
  @keyframes shake { 0% { transform: translateX(0) } 20% { transform: translateX(-8px) } 40% { transform: translateX(8px) } 60% { transform: translateX(-6px) } 80% { transform: translateX(4px) } 100% { transform: translateX(0) } }

  /* confetti pieces */
  .confetti { position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none; overflow:visible; }

  /* right-side card */
  .right { padding:22px 26px; display:flex; flex-direction:column; gap:12px; }
  .meta {display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .timer, .score { font-weight:800; color:var(--muted); background:#fff0 fb; padding:6px 10px; border-radius:10px;}
  .question { font-size:18px; font-weight:700; margin-top:6px; color:#0b2340;}
  .options { display:grid; gap:10px; margin-top:10px; }
  .opt { background:#f4f7ff; border:2px solid transparent; padding:12px 14px; border-radius:10px; cursor:pointer; text-align:left; font-weight:600; transition: transform .12s ease, box-shadow .12s ease; }
  .opt:hover { transform: translateY(-4px); box-shadow:0 8px 18px rgba(20,30,60,0.08); }
  .opt.correct { background:#d8f9e0; border-color:#7fe19b; }
  .opt.wrong { background:#ffe3e3; border-color:#ff9b9b; opacity:0.95; }
  .controls { margin-top:auto; display:flex; gap:10px; align-items:center; }
  button { background:var(--accent); color:white; border:0; padding:10px 14px; border-radius:10px; font-weight:700; cursor:pointer; }
  button.secondary { background:#536dfe; }
  .small { font-size:18px; opacity:0.95; }

  /* responsive */
  @media (max-width:850px) {
    .container { grid-template-columns: 1fr; }
    .left { order:2; }
    .right { order:1; }
  }
</style>
</head>
<body>

<div class="container" role="application" aria-label="Cartoon hit quiz">
  <div class="left" aria-hidden="false">
    <div class="title">Cartoon Hit Quiz</div>

    <div class="mascot-wrap" id="mascotWrap">
      <div class="stage" aria-hidden="true"></div>

      <!-- Simple cartoon using inline SVG: head, body, arm (arm is separate group to swing) -->
      <svg id="mascotSVG" viewBox="0 0 260 260" role="img" aria-label="mascot">
        <!-- body -->
        <g id="mascot" transform="translate(20,10)">
          <ellipse cx="110" cy="150" rx="80" ry="30" fill="#ffe4b5" />
          <circle cx="110" cy="90" r="60" fill="#ffdca3" stroke="#f0b56a" stroke-width="2"/>
          <!-- eyes -->
          <circle cx="88" cy="82" r="12" fill="#fff" />
          <circle cx="132" cy="82" r="12" fill="#fff" />
          <circle id="p1" cx="90" cy="84" r="5" fill="#111" />
          <circle id="p2" cx="134" cy="84" r="5" fill="#111" />
          <!-- smile -->
          <path d="M85 110 Q110 130 135 110" stroke="#663" stroke-width="3" fill="transparent" stroke-linecap="round" />
          <!-- left arm (static) -->
          <g id="arm-left" transform="translate(40,120)">
            <rect x="-6" y="0" rx="6" ry="6" width="12" height="60" fill="#ffdca3" />
            <circle cx="0" cy="68" r="14" fill="#ffdca3" />
          </g>
          <!-- right arm (this will swing) -->
          <g id="arm-right" transform="translate(180,110)">
            <!-- forearm group pivot at left top of this group (we set transform-origin in CSS) -->
            <rect x="0" y="8" rx="6" ry="6" width="70" height="16" fill="#ffdca3" />
            <circle cx="74" cy="16" r="16" fill="#ffdca3" />
            <!-- little glove/hit effect circle -->
            <circle id="hitGlow" cx="86" cy="16" r="2" fill="#ffdd66" opacity="0" />
          </g>
        </g>
      </svg>

      <div class="confetti" id="confetti"></div>
    </div>

    <div style="text-align:center; font-size:13px; color:#456;">
      Mascot reactions: <strong>arm swing</strong> for correct, <strong>shake</strong> for wrong.
    </div>
  </div>

  <div class="right">
    <div class="meta">
      <div class="small">Question <span id="qIndex">0</span>/<span id="qTotal">0</span></div>
      <div>
        <span id="score" class="small">Score: 0</span>
        &nbsp;&nbsp;
        <span id="timeleft" class="small">Time: 60s</span>
      </div>
    </div>

    <div class="question" id="question">Press Start to begin</div>

    <div class="options" id="options" role="list"></div>

    <div class="controls">
      <button id="startBtn" class="secondary">Start Quiz</button>
      <button id="nextBtn" style="background:#10b981">Next</button>
      <div style="margin-left:auto; color:#666; font-size:13px;">
        <span id="feedback"></span>
      </div>
    </div>
  </div>
</div>

<script>
/* --- Quiz data: customize here --- */
const QUESTIONS = [
  {q: "int k=5,j=9; k+=k++-++j+k;give the value of k and j", opts: ["k=6, j=10","k=10,j=6","k=4,j=6","k=6,j=4"], a:0},
  {q: "Find the value of n,if value of p=5,q=19 int n=(q-p)>(p-q)?(q-p):(p-q)", opts: ["n=14","n=15","n=13","n=12"], a:0},
  {q: "which type of type-casting are shown in the following examples? double x=15.2; int y=(int)x", opts:["Implicit","conversion","Explicit","none of the above"], a:2},
  
{q:"What is the output of the following? char c='A'; short m=26; int n=c+m display n",opts:["n=91","n=90","n=87","n=93"],a:0},

];

let questions = [];
let current = -1;
let score = 0;
let started = false;
let totalTime = 60; // seconds
let timerId = null;
let startTs = null;

/* --- DOM refs --- */
const qIndex = document.getElementById('qIndex');
const qTotal = document.getElementById('qTotal');
const questionEl = document.getElementById('question');
const optionsEl = document.getElementById('options');
const scoreEl = document.getElementById('score');
const timeLeftEl = document.getElementById('timeleft');
const startBtn = document.getElementById('startBtn');
const nextBtn = document.getElementById('nextBtn');
const feedback = document.getElementById('feedback');
const mascot = document.getElementById('mascot');
const armRight = document.getElementById('arm-right');
const mascotWrap = document.getElementById('mascotWrap');
const confettiContainer = document.getElementById('confetti');
const hitGlow = document.getElementById('hitGlow');

/* --- init --- */
qTotal.textContent = QUESTIONS.length;
qIndex.textContent = 0;
nextBtn.disabled = true;

/* shuffle copy utility */
function shuffle(arr){ return arr.slice().sort(()=>Math.random()-0.5); }

function startQuiz(){
  questions = shuffle(QUESTIONS);
  current = -1;
  score = 0;
  scoreEl.textContent = "Score: 0";
  startBtn.disabled = true;
  nextBtn.disabled = true;
  started = true;
  startTs = Date.now();
  timeLeftEl.textContent = `Time: ${totalTime}s`;
  if (timerId) clearInterval(timerId);
  timerId = setInterval(updateTimer, 250);
  feedback.textContent = "";
  nextQuestion();
}

function updateTimer(){
  const elapsed = Math.floor((Date.now() - startTs)/1000);
  const rem = Math.max(0, totalTime - elapsed);
  timeLeftEl.textContent = `Time: ${rem}s`;
  if(rem <= 0){
    endQuiz();
  }
}

function nextQuestion(){
  current++;
  if(current >= questions.length){
    endQuiz();
    return;
  }
  renderQuestion();
  nextBtn.disabled = true;
  qIndex.textContent = current + 1;
}

function renderQuestion(){
  const Q = questions[current];
  questionEl.textContent = Q.q;
  optionsEl.innerHTML = '';
  Q.opts.forEach((optText, i) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.setAttribute('role','button');
    div.setAttribute('tabindex',0);
    div.textContent = String.fromCharCode(65+i) + '. ' + optText;
    div.addEventListener('click', ()=>choose(i, div));
    div.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' ') choose(i, div); });
    optionsEl.appendChild(div);
  });
}

/* choose option */
function choose(i, el){
  if(!started) return;
  // disable all
  Array.from(optionsEl.children).forEach(ch=> ch.style.pointerEvents = 'none');
  const Q = questions[current];
  // show correct/wrong classes
  if(i === Q.a){
    el.classList.add('correct');
    feedback.textContent = "Right!";
    score++;
    scoreEl.textContent = `Score: ${score}`;
    triggerArmHit();
    triggerConfetti(16);
  } else {
    el.classList.add('wrong');
    // highlight correct
    const correctEl = optionsEl.children[Q.a];
    if(correctEl) correctEl.classList.add('correct');
    feedback.textContent = `Wrong — correct is ${String.fromCharCode(65+Q.a)}.`;
    triggerShake();
  }
  nextBtn.disabled = false;
}

/* animation triggers */
function triggerArmHit(){
  // small glow at tip
  hitGlow.setAttribute('opacity', 1);
  // add class to swing arm (CSS handles animation)
  armRight.classList.add('arm-swing');
  // pulse the glow then hide
  setTimeout(()=> hitGlow.setAttribute('opacity', 0), 240);
  // remove class after animation to allow re-trigger
  setTimeout(()=> armRight.classList.remove('arm-swing'), 380);
}

function triggerShake(){
  mascotWrap.classList.add('mascot-shake');
  setTimeout(()=> mascotWrap.classList.remove('mascot-shake'), 420);
}

/* confetti: simple dots that fall with random rotation */
function triggerConfetti(amount=20){
  for(let i=0;i<amount;i++){
    const piece = document.createElement('div');
    piece.style.position = 'absolute';
    piece.style.left = (50 + (Math.random()*120 - 60)) + '%';
    piece.style.top = (10 + Math.random()*30) + '%';
    piece.style.width = (6 + Math.random()*8) + 'px';
    piece.style.height = (8 + Math.random()*12) + 'px';
    piece.style.borderRadius = '2px';
    piece.style.background = randomColor();
    piece.style.transform = `translateY(0) rotate(${Math.random()*360}deg)`;
    piece.style.opacity = '0.98';
    piece.style.zIndex = 999;
    confettiContainer.appendChild(piece);
    // animate falling
    const toY = 220 + Math.random()*120;
    const duration = 900 + Math.random()*900;
    piece.animate([
      { transform: `translateY(0) rotate(0deg)`, opacity:1 },
      { transform: `translateY(${toY}px) rotate(${Math.random()*720-360}deg)`, opacity:0.6 }
    ], {duration: duration, easing:'cubic-bezier(.2,.8,.2,1)'});
    // remove after
    setTimeout(()=> piece.remove(), duration + 60);
  }
}
function randomColor(){
  const palette = ['#ff6b6b','#ffd93d','#6bcB77','#4d96ff','#c084fc','#ff9f43'];
  return palette[Math.floor(Math.random()*palette.length)];
}

function endQuiz(){
  started = false;
  startBtn.disabled = false;
  nextBtn.disabled = true;
  if (timerId) clearInterval(timerId);
  questionEl.textContent = `Quiz finished CONGRADULATION — Score ${score}/${questions.length}`;
  optionsEl.innerHTML = '';
  feedback.textContent = 'Nice! Click Start to play again.';
  qIndex.textContent = questions.length;
}

/* event handlers */
startBtn.addEventListener('click', startQuiz);
nextBtn.addEventListener('click', nextQuestion);

/* keyboard: next on space if available */
document.addEventListener('keydown',(e)=>{
  if(e.key===' ' && !nextBtn.disabled && started) {
    e.preventDefault();
    nextQuestion();
  }
});
</script>
</body>
</html>
